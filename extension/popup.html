<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeetCode Tracker Companion</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="header">
      <div class="logo-area">
        <span class="logo-icon">⚡</span>
        <h1 class="logo-text">LeetCode Tracker</h1>
      </div>
      <div class="status-badge" id="status-badge">
        <span class="status-dot"></span>
        <span class="status-text" id="status-text">Disconnected</span>
      </div>
    </header>

    <!-- Main Content -->
    <main class="content">
      <!-- Active LeetCode page state -->
      <div id="active-state" class="state-container hidden">
        <div class="section-label">Active Question</div>
        <div class="question-card">
          <div class="question-header">
            <span class="question-id" id="question-id"></span>
            <span class="difficulty-pill" id="difficulty-pill">Unknown</span>
          </div>
          <h2 class="question-title" id="question-title">Loading...</h2>
          <div class="question-url-container">
            <a href="#" target="_blank" class="question-link" id="question-link">
              <span class="url-text" id="url-text">leetcode.com/problems/...</span>
              <span class="external-icon">↗</span>
            </a>
          </div>
          <div class="submission-status-container">
            <span class="status-label">Status:</span>
            <span id="submission-status" class="status-value not-accepted">Not Accepted Yet</span>
          </div>
        </div>
        <div class="extensible-footer-info">
          <span>🎯 Extensible Architecture: Ready for GitHub sync & submission tracking</span>
        </div>
      </div>

      <!-- Inactive page state (Non-LeetCode or dashboard) -->
      <div id="inactive-state" class="state-container">
        <div class="empty-state">
          <div class="empty-icon">🧩</div>
          <h3>Not on a LeetCode problem</h3>
          <p>Navigate to any problem on <a href="https://leetcode.com/problems/" target="_blank">leetcode.com/problems/</a> to begin tracking.</p>
        </div>
      </div>
    </main>
  </div>
  <script src="popup.js"></script>
</body>
</html>
