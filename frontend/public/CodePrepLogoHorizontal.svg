<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="100%" height="100%">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF7A00" />
      <stop offset="100%" stop-color="#FFD700" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Icon container -->
  <g transform="translate(10, 10)">
    <!-- Glow behind the icon -->
    <rect x="0" y="0" width="60" height="60" rx="16" fill="url(#logoGrad)" opacity="0.15" filter="url(#glow)" />
    <!-- Main glass card -->
    <rect x="0" y="0" width="60" height="60" rx="16" fill="#0D0D12" stroke="url(#logoGrad)" stroke-width="2" />
    
    <!-- < C monogram -->
    <path d="M 27 21 L 16 30 L 27 39" stroke="url(#logoGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <!-- | Divider -->
    <path d="M 33 17 L 33 43" stroke="url(#logoGrad)" stroke-width="4" stroke-linecap="round" fill="none" />
    <!-- P loop -->
    <path d="M 33 17 L 43 17 C 49 17, 49 30, 43 30 L 33 30" stroke="url(#logoGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>
  
  <!-- Wordmark -->
  <text x="85" y="44" font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif" font-weight="900" font-size="26" fill="#FFFFFF" letter-spacing="0.5">Code<tspan fill="url(#logoGrad)">Prep</tspan></text>
  
  <!-- AI Tag -->
  <g transform="translate(216, 23)">
    <rect x="0" y="0" width="24" height="16" rx="4" fill="url(#logoGrad)" />
    <text x="12" y="12" font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif" font-weight="900" font-size="9" fill="#0B0B0F" text-anchor="middle">AI</text>
  </g>
</svg>
