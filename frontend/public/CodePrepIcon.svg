<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="100%" height="100%">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF7A00" />
      <stop offset="100%" stop-color="#FFD700" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Glow behind the icon -->
  <rect x="10" y="10" width="60" height="60" rx="16" fill="url(#logoGrad)" opacity="0.15" filter="url(#glow)" />
  <!-- Main glass card -->
  <rect x="10" y="10" width="60" height="60" rx="16" fill="#0D0D12" stroke="url(#logoGrad)" stroke-width="2" />
  
  <!-- < C monogram -->
  <path d="M 37 31 L 26 40 L 37 49" stroke="url(#logoGrad)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  <!-- | Divider -->
  <path d="M 43 27 L 43 53" stroke="url(#logoGrad)" stroke-width="4.5" stroke-linecap="round" fill="none" />
  <!-- P loop -->
  <path d="M 43 27 L 53 27 C 59 27, 59 40, 53 40 L 43 40" stroke="url(#logoGrad)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
</svg>
