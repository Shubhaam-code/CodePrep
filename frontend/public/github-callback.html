<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Connecting GitHub...</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0B0B0F;
      color: #F1F5F9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .box {
      max-width: 420px;
      padding: 28px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      background: #0F0F1A;
    }
    h2 {
      margin-top: 0;
      font-size: 20px;
      font-weight: 700;
    }
    p {
      color: #94A3B8;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2 id="title">Connecting...</h2>
    <p id="message">Successfully authorized! Connecting your profile...</p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const status = params.get('status');
    const username = params.get('username');
    const profileUrl = params.get('profileUrl');
    const errorMsg = params.get('message') || 'GitHub connection failed.';

    const isSuccess = status === 'success';
    
    document.getElementById('title').textContent = isSuccess ? 'GitHub Connected' : 'Connection Failed';
    document.getElementById('message').textContent = isSuccess 
      ? 'GitHub connected successfully. You can close this window.'
      : errorMsg + ' You can close this window.';

    const payload = {
      provider: 'github',
      type: isSuccess ? 'oauth-success' : 'oauth-error',
      success: isSuccess,
      githubUsername: username || null,
      githubProfileUrl: profileUrl || null,
      message: isSuccess ? null : errorMsg
    };

    // Try window.opener postMessage as a backup
    try {
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage(payload, window.location.origin);
      }
    } catch (e) {
      console.warn('[GitHub OAuth Callback] Cannot postMessage to window.opener directly:', e);
    }

    // Broadcast via BroadcastChannel
    try {
      const channel = new BroadcastChannel('github-oauth-channel');
      channel.postMessage(payload);
      channel.close();
    } catch (e) {
      console.error('[GitHub OAuth Callback] BroadcastChannel failed:', e);
    }

    // Write to localStorage as a fallback
    try {
      localStorage.setItem('github-oauth-result', JSON.stringify({
        ...payload,
        timestamp: Date.now()
      }));
    } catch (e) {
      console.error('[GitHub OAuth Callback] localStorage write failed:', e);
    }

    // Close the popup
    setTimeout(() => {
      window.close();
    }, 500);
  </script>
</body>
</html>
